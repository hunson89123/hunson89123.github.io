<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <title>Pitector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/jquery-loadingModal@1.0.2/css/jquery.loadingModal.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
            text-align: center;
        }

        #map {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
        }

        #mapController {
            position: absolute;
            z-index: 1000;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        #searchNearbyBtn,
        #myLocation,
        #nearbyLocationBtn {
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5);
            background-color: #ffffff;
            border: 0;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            background-size: cover;
            color: white;
            cursor: pointer;
            font-size: 15pt;
            color: #666666;
        }

        #myLocation.is-following {
            background-color: #2563eb;
            color: #ffffff;
        }

        .map-controls button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #nearbyLocationBtn {
            position: absolute;
            z-index: 1000;
            right: 0;
            bottom: 24px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .s2-popup-list {
            margin: 6px 0 0;
            padding-left: 18px;
            max-height: 180px;
            overflow-y: auto;
        }

        .swal-radar-icon {
            border: 0 !important;
            margin-bottom: 0 !important;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="mapController">
        <button id="searchNearbyBtn" type="button"><i class="fa-solid fa-satellite-dish"></i></button>
        <button id="myLocation"><i class="fa-solid fa-location-crosshairs"></i></button>
    </div>
    <button id="nearbyLocationBtn" type="button"><i class="fa-solid fa-map-location-dot"></i></button>
</body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-loadingModal@1.0.2/js/jquery.loadingModal.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/s2-geometry@1.2.10/src/s2geometry.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26/dist/sweetalert2.all.min.js"></script>
<script src="scripts.js"></script>

</html>
