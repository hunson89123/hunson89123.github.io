<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <title>Pitector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/jquery-loadingModal@1.0.2/css/jquery.loadingModal.min.css" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
            text-align: center;
        }

        #map {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
        }

        #mapController {
            position: absolute;
            z-index: 1000;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        #searchNearbyBtn,
        #myLocation,
        #nearbyLocationBtn {
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 8px 8px 20px rgba(0, 0, 0, 0.5);
            background-color: #ffffff;
            border: 0;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            background-size: cover;
            color: white;
            cursor: pointer;
            font-size: 20pt;
            font-weight: bold;
            color: #666666;
        }

        #myLocation.is-following {
            background-color: #2563eb;
            color: #ffffff;
        }

        .map-controls button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #nearbyLocationBtn {
            position: absolute;
            z-index: 1000;
            right: 0;
            bottom: 24px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .s2-popup-list {
            margin: 6px 0 0;
            padding-left: 18px;
            max-height: 180px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="mapController">
        <button id="searchNearbyBtn" type="button"><i class="bi bi-radar"></i></button>
        <button id="myLocation"> <i class="bi bi-crosshair"></i></button>
    </div>
    <button id="nearbyLocationBtn" type="button"><i class="bi bi-list"></i></button>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-loadingModal@1.0.2/js/jquery.loadingModal.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/s2-geometry@1.2.10/src/s2geometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26/dist/sweetalert2.all.min.js"></script>
    <script>
        const map = L.map("map").setView([25.05717472524907, 121.36508365158228], 16);
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        const s2Layer = L.layerGroup().addTo(map);
        const scanLayer = L.layerGroup().addTo(map);
        const s2Cells = new Map();
        let scannedS2Keys = new Set();

        const poiLayer = L.layerGroup().addTo(map);
        const poiCircles = [];
        let abortController = null;
        let debounceTimer = null;
        let lastFetchTime = 0;
        let selectedS2Key = null;
        let selectedS2Layer = null;
        const SCAN_RADIUS_METERS = 100;

        const S2_NORMAL_STYLE = {
            color: "#2563eb",
            weight: 1,
            opacity: 0.2,
            fillColor: "#60a5fa",
            fillOpacity: 0.01,
            interactive: true
        };

        const S2_SELECTED_STYLE = {
            color: "#f97316",
            weight: 3,
            opacity: 0.95,
            fillColor: "#fb923c",
            fillOpacity: 0.25,
            interactive: true
        };

        const S2_SCANNED_STYLE = {
            color: "#16a34a",
            weight: 3,
            opacity: 0.95,
            fillColor: "#86efac",
            fillOpacity: 0.28,
            interactive: true
        };

        const SCAN_CIRCLE_STYLE = {
            radius: SCAN_RADIUS_METERS,
            color: "#dc2626",
            weight: 2,
            opacity: 0.9,
            fillColor: "#fca5a5",
            fillOpacity: 0.18,
            interactive: false
        };

        function buildOverpassQuery(bounds) {
            const s = bounds.getSouth();
            const w = bounds.getWest();
            const n = bounds.getNorth();
            const e = bounds.getEast();

            return `
   [out:json][timeout:25];
            (
            /* 洗衣 / 居家修繕 / 家電3C */
            node["shop"~"^(laundry|dry_cleaning|doityourself|hardware|appliance|computer|electronics)$"](${s},${w},${n},${e});
            way["shop"~"^(laundry|dry_cleaning|doityourself|hardware|appliance|computer|electronics)$"](${s},${w},${n},${e});
            relation["shop"~"^(laundry|dry_cleaning|doityourself|hardware|appliance|computer|electronics)$"](${s},${w},${n},${e});

            /* 超市 / 超商 / 百貨 / 服飾 / 鞋店 / 麵包甜點 / 藝術 / 書店 / 文具店 */
            node["shop"~"^(supermarket|convenience|department_store|clothes|shoes|bakery|pastry|art|books|hairdresser|chemist|stationery)$"](${s},${w},${n},${e});
            way["shop"~"^(supermarket|convenience|department_store|clothes|shoes|bakery|pastry|art|books|hairdresser|chemist|stationery)$"](${s},${w},${n},${e});
            relation["shop"~"^(supermarket|convenience|department_store|clothes|shoes|bakery|pastry|art|books|hairdresser|chemist|stationery)$"](${s},${w},${n},${e});

            /* 一般餐飲 */
            node["amenity"~"^(restaurant|fast_food|cafe)$"](${s},${w},${n},${e});
            way["amenity"~"^(restaurant|fast_food|cafe)$"](${s},${w},${n},${e});
            relation["amenity"~"^(restaurant|fast_food|cafe)$"](${s},${w},${n},${e});

            /* 指定料理類型 */
            node["amenity"~"^(restaurant|fast_food|cafe)$"]["cuisine"~"(^|;)(mexican|korean|curry|indian|sri_lankan|sushi|pizza|mediterranean|chinese|noodle|ramen|udon|soba)(;|$)"](${s},${w},${n},${e});
            way["amenity"~"^(restaurant|fast_food|cafe)$"]["cuisine"~"(^|;)(mexican|korean|curry|indian|sri_lankan|sushi|pizza|mediterranean|chinese|noodle|ramen|udon|soba)(;|$)"](${s},${w},${n},${e});
            relation["amenity"~"^(restaurant|fast_food|cafe)$"]["cuisine"~"(^|;)(mexican|korean|curry|indian|sri_lankan|sushi|pizza|mediterranean|chinese|noodle|ramen|udon|soba)(;|$)"](${s},${w},${n},${e});

            /* 教育 / 宗教 / 郵局 / 藥局 / 圖書館 / 電影院 */
            node["amenity"~"^(university|college|post_office|pharmacy|library|cinema)$"](${s},${w},${n},${e});
            way["amenity"~"^(university|college|post_office|pharmacy|library|cinema)$"](${s},${w},${n},${e});
            relation["amenity"~"^(university|college|post_office|pharmacy|library|cinema)$"](${s},${w},${n},${e});

            /* 動物園 / 主題樂園 / 飯店 */
            node["tourism"~"^(zoo|theme_park|hotel)$"](${s},${w},${n},${e});
            way["tourism"~"^(zoo|theme_park|hotel)$"](${s},${w},${n},${e});
            relation["tourism"~"^(zoo|theme_park|hotel)$"](${s},${w},${n},${e});

            /* 車站 / 公車站 / 機場 */
            node["railway"="station"](${s},${w},${n},${e});
            way["railway"="station"](${s},${w},${n},${e});
            relation["railway"="station"](${s},${w},${n},${e});

            node["building"="train_station"](${s},${w},${n},${e});
            way["building"="train_station"](${s},${w},${n},${e});
            relation["building"="train_station"](${s},${w},${n},${e});

            node["highway"="bus_stop"](${s},${w},${n},${e});
            way["highway"="bus_stop"](${s},${w},${n},${e});
            relation["highway"="bus_stop"](${s},${w},${n},${e});

            node["aeroway"="aerodrome"](${s},${w},${n},${e});
            way["aeroway"="aerodrome"](${s},${w},${n},${e});
            relation["aeroway"="aerodrome"](${s},${w},${n},${e});

            /* 公園 / 體育場 */
            node["leisure"~"^(park|stadium)$"](${s},${w},${n},${e});
            way["leisure"~"^(park|stadium)$"](${s},${w},${n},${e});
            relation["leisure"~"^(park|stadium)$"](${s},${w},${n},${e});

            /* 海灘 / 山峰 / 水域 / 森林 */
            node["natural"~"^(water|peak|beach|wood)$"](${s},${w},${n},${e});
            way["natural"~"^(water|peak|beach|wood)$"](${s},${w},${n},${e});
            relation["natural"~"^(water|peak|beach|wood)$"](${s},${w},${n},${e});

            node["landuse"="forest"](${s},${w},${n},${e});
            way["landuse"="forest"](${s},${w},${n},${e});
            relation["landuse"="forest"](${s},${w},${n},${e});

            /* 橋 */
            node["bridge"="yes"](${s},${w},${n},${e});
            way["bridge"="yes"](${s},${w},${n},${e});
            relation["bridge"="yes"](${s},${w},${n},${e});
            );
            out center tags 1000;
            `.trim();

        }
        function getLatLng(el) {
            if (typeof el.lat === "number" && typeof el.lon === "number") {
                return [el.lat, el.lon];
            }
            if (el.center && typeof el.center.lat === "number" && typeof el.center.lon === "number") {
                return [el.center.lat, el.center.lon];
            }
            return null;
        }

        function getLabel(el) {
            const tags = el.tags || {};
            return (
                tags.name ||
                tags.brand ||
                tags.amenity ||
                tags.shop ||
                tags.tourism ||
                tags.leisure ||
                `${el.type}/${el.id}`
            );
        }

        const S2_LEVEL = 17;

        // level 16 大約是 100～150m 級別。
        // 掃描間距故意設小一點，避免漏掉畫面邊緣的 cell。
        const S2_SCAN_STEP_METERS = 60;

        function metersToLatDegrees(meters) {
            return meters / 111320;
        }

        function metersToLngDegrees(meters, lat) {
            return meters / (111320 * Math.cos(lat * Math.PI / 180));
        }

        function getS2KeyFromLatLng(lat, lng, level) {
            const cell = S2.S2Cell.FromLatLng({ lat, lng }, level);
            return cell.toHilbertQuadkey();
        }

        function getS2PolygonFromKey(key) {
            const cell = S2.S2Cell.FromHilbertQuadKey(key);
            const corners = cell.getCornerLatLngs();

            const latlngs = corners.map(corner => [
                corner.lat,
                corner.lng
            ]);

            // Leaflet polygon 不一定要手動閉合，但閉合後比較直覺
            latlngs.push(latlngs[0]);

            return latlngs;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function resetS2CellStyles() {
            s2Cells.forEach((cellInfo, key) => {
                cellInfo.layer.setStyle(key === selectedS2Key ? S2_SELECTED_STYLE : S2_NORMAL_STYLE);
            });
        }

        function getS2CenterFromPolygon(polygonLatLngs) {
            // polygonLatLngs 最後一點是閉合用，計算中心時排除最後一點。
            const corners = polygonLatLngs.slice(0, 4);
            const avgLat = corners.reduce((sum, point) => sum + point[0], 0) / corners.length;
            const avgLng = corners.reduce((sum, point) => sum + point[1], 0) / corners.length;
            return L.latLng(avgLat, avgLng);
        }

        function getPoisInS2Keys(s2Keys) {
            return poiCircles
                .filter((poi) => s2Keys.has(getS2KeyFromLatLng(poi.latlng.lat, poi.latlng.lng, S2_LEVEL)))
                .sort((a, b) => a.name.localeCompare(b.name, "zh-Hant"));
        }

        function scanS2CellsByPoint(clicked) {
            selectedS2Key = null;
            selectedS2Layer = null;

            scanLayer.clearLayers();
            L.circle(clicked, SCAN_CIRCLE_STYLE).addTo(scanLayer);

            resetS2CellStyles();

            scannedS2Keys = new Set();

            s2Cells.forEach((cellInfo, key) => {
                const distanceToCenter = clicked.distanceTo(cellInfo.center);

                // 「圓圈有接觸到 S2 Cell 正中心」= S2 中心點距離點擊位置 <= 100 公尺。
                if (distanceToCenter <= SCAN_RADIUS_METERS) {
                    scannedS2Keys.add(key);
                    cellInfo.layer.setStyle(S2_SCANNED_STYLE);
                    cellInfo.layer.bringToFront();
                }
            });

            const matchedPois = getPoisInS2Keys(scannedS2Keys);
            const html = matchedPois.length === 0
                ? `
                    <b>探測器應探測之地點</b><br>
                    目前沒有已搜尋到的地點。
                `
                : `
                    <b>探測器應探測之${matchedPois.length}個地點</b><br>
                    <ul class="s2-popup-list">
                        ${matchedPois.map((poi) => `<li>${escapeHtml(poi.name)}</li>`).join("")}
                    </ul>
                `;

            /*L.popup()
                .setLatLng(clicked)
                .setContent(html)
                .openOn(map);*/
        }
        function getPoisInS2Cell(s2Key) {
            return poiCircles
                .filter((poi) => getS2KeyFromLatLng(poi.latlng.lat, poi.latlng.lng, S2_LEVEL) === s2Key)
                .sort((a, b) => a.name.localeCompare(b.name, "zh-Hant"));
        }

        function selectS2Cell(s2Key, polygonLatLngs, layer) {
            if (selectedS2Layer && selectedS2Layer !== layer) {
                selectedS2Layer.setStyle(S2_NORMAL_STYLE);
            }

            selectedS2Key = s2Key;
            selectedS2Layer = layer;
            layer.setStyle(S2_SELECTED_STYLE);
            layer.bringToFront();

            const poisInCell = getPoisInS2Cell(s2Key);

            const content = poisInCell.length === 0
                ? `<b>S2 Cell</b><br><code>${escapeHtml(s2Key)}</code><br>此區域目前沒有已搜尋到的地點。`
                : `
                    <b>S2 Cell 內的地點：${poisInCell.length} 個</b><br>
                    <code>${escapeHtml(s2Key)}</code>
                    <ul class="s2-popup-list">
                        ${poisInCell.map((poi) => `<li>${escapeHtml(poi.name)}</li>`).join("")}
                    </ul>
                `;

            const popupLatLng = L.latLngBounds(polygonLatLngs).getCenter();
            L.popup()
                .setLatLng(popupLatLng)
                .setContent(content)
                .openOn(map);
        }

        function drawS2Cells() {
            s2Layer.clearLayers();
            s2Cells.clear();

            if (map.getZoom() < 15) {
                return;
            }

            const bounds = map.getBounds();

            const south = bounds.getSouth();
            const west = bounds.getWest();
            const north = bounds.getNorth();
            const east = bounds.getEast();

            const centerLat = bounds.getCenter().lat;

            const latStep = metersToLatDegrees(S2_SCAN_STEP_METERS);
            const lngStep = metersToLngDegrees(S2_SCAN_STEP_METERS, centerLat);

            const keys = new Set();

            // 多掃一圈，避免畫面邊緣有破洞
            for (let lat = south - latStep; lat <= north + latStep; lat += latStep) {
                for (let lng = west - lngStep; lng <= east + lngStep; lng += lngStep) {
                    const key = getS2KeyFromLatLng(lat, lng, S2_LEVEL);
                    keys.add(key);
                }
            }

            selectedS2Layer = null;

            for (const key of keys) {
                const polygon = getS2PolygonFromKey(key);
                const style = scannedS2Keys.has(key)
                    ? S2_SCANNED_STYLE
                    : (key === selectedS2Key ? S2_SELECTED_STYLE : S2_NORMAL_STYLE);

                const layer = L.polygon(polygon, style).addTo(s2Layer);
                const center = getS2CenterFromPolygon(polygon);

                s2Cells.set(key, {
                    key,
                    polygon,
                    center,
                    layer
                });

                if (scannedS2Keys.has(key) || key === selectedS2Key) {
                    if (key === selectedS2Key) {
                        selectedS2Layer = layer;
                    }
                    layer.bringToFront();
                }

                layer.on("click", (e) => {
                    L.DomEvent.stopPropagation(e);
                    scanS2CellsByPoint(e.latlng);
                });
            }
        }

        function scheduleRefresh() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                drawS2Cells();
            }, 700);
        }

        function setSearchLoading(isLoading, message = "") {
            $("#searchNearbyBtn").prop("disabled", isLoading);

            if (isLoading) {
                $("body").loadingModal({
                    text: "搜尋附近地點中...",
                    animation: "cubeGrid",
                    backgroundColor: "rgba(0, 0, 0, 0.65)",
                    color: "#ffffff",
                    opacity: "0.7"
                });
            } else {
                $('body').loadingModal('destroy');
            }
        }

        async function refreshPOIs() {
            if (map.getZoom() < 15) {
                poiLayer.clearLayers();
                poiCircles.length = 0;
                setSearchLoading(false, "請放大到 15 級以上再搜尋");
                return;
            }

            const now = Date.now();
            if (now - lastFetchTime < 2000) {
                setSearchLoading(false, "搜尋太頻繁，請稍後再試");
                return;
            }
            lastFetchTime = now;

            if (abortController) abortController.abort();
            abortController = new AbortController();

            const query = buildOverpassQuery(map.getBounds());

            setSearchLoading(true, "搜尋中...");

            try {
                const res = await fetch("https://overpass-api.de/api/interpreter", {
                    method: "POST",
                    body: query,
                    signal: abortController.signal
                });

                if (res.status === 429 || res.status === 504) {
                    console.warn("呼叫API次數過於頻繁，請於1分鐘後再試");
                    setSearchLoading(false, "呼叫API次數過於頻繁，請於1分鐘後再試");
                    $('body').loadingModal('destroy');
                    return;
                }

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const data = await res.json();
                console.table(data);
                poiLayer.clearLayers();
                poiCircles.length = 0;

                const seen = new Set();

                for (const el of data.elements || []) {
                    const latlng = getLatLng(el);
                    if (!latlng) continue;

                    const key = `${el.type}-${el.id}`;
                    if (seen.has(key)) continue;
                    seen.add(key);

                    const label = getLabel(el);
                    const latLngObj = L.latLng(latlng[0], latlng[1]);

                    L.marker(latLngObj)
                        .bindPopup(label)
                        .addTo(poiLayer);

                    poiCircles.push({
                        id: key,
                        name: label,
                        latlng: latLngObj,
                        radius: 100
                    });
                }

                if (scannedS2Keys.size > 0) {
                    resetS2CellStyles();
                    scannedS2Keys.forEach((key) => {
                        const cellInfo = s2Cells.get(key);
                        if (cellInfo) {
                            cellInfo.layer.setStyle(S2_SCANNED_STYLE);
                            cellInfo.layer.bringToFront();
                        }
                    });
                }

                setSearchLoading(false, `已完成搜尋，共 ${poiCircles.length} 個地點`);
                console.log(`已完成掃描，共計${poiCircles.length}個地點!`);
            } catch (err) {
                if (err.name !== "AbortError") {
                    console.error(err);
                    setSearchLoading(false, "搜尋失敗，請查看 console");
                }
            } finally {
                if (!abortController?.signal.aborted) {
                    $("#searchNearbyBtn").prop("disabled", false);
                    $('body').loadingModal('destroy');
                }
            }
        }

        map.on("click", (e) => {
            scanS2CellsByPoint(e.latlng);
        });

        $("#searchNearbyBtn").on("click", () => {
            refreshPOIs();
        });

        $("#nearbyLocationBtn").on("click", () => {
            Swal.fire({
                icon: "info",
                title: "功能尚未開放",
                text: "這項功能正在開發中，敬請期待！",
                confirmButtonText: "好吧😥"
            });
        });

        drawS2Cells();

        map.on("moveend zoomend", scheduleRefresh);

        // 使用者定位：預設只更新圖標，不自動置中；按下 myLocation 後才鎖定跟隨。
        let userMarker = null;
        let userAccuracyCircle = null;
        let lastUserLatLng = null;
        let isFollowingUser = false;

        function updateMyLocationButton() {
            $("#myLocation").toggleClass("is-following", isFollowingUser);
        }

        function focusUserLocation(latlng) {
            map.setView(latlng, Math.max(map.getZoom(), 17), {
                animate: true
            });

            scanS2CellsByPoint(latlng);
        }

        map.locate({
            watch: true,
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 10000
        });

        map.on("locationfound", (e) => {
            const latlng = e.latlng;
            const accuracy = e.accuracy;
            lastUserLatLng = latlng;

            if (!userMarker) {
                userMarker = L.marker(latlng).addTo(map)
                    .bindPopup("你目前的位置");
            } else {
                userMarker.setLatLng(latlng);
            }

            if (!userAccuracyCircle) {
                userAccuracyCircle = L.circle(latlng, {
                    radius: accuracy,
                    weight: 1,
                    fillOpacity: 0.12
                }).addTo(map);
            } else {
                userAccuracyCircle.setLatLng(latlng);
                userAccuracyCircle.setRadius(accuracy);
            }

            // 只有按下 myLocation 進入鎖定狀態後，才會隨定位移動自動置中。
            if (isFollowingUser) {
                map.panTo(latlng, {
                    animate: true
                });

                scanS2CellsByPoint(latlng);
            }
        });

        $("#myLocation").on("click", () => {
            isFollowingUser = true;
            updateMyLocationButton();
            if (lastUserLatLng) {
                focusUserLocation(lastUserLatLng);
                return;
            }
            // 還沒有拿到定位時，重新要求一次目前位置。
            map.locate({
                setView: false,
                watch: false,
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        });

        map.on("dragstart", () => {
            // 使用者手動拖曳地圖時解除鎖定，避免地圖一直被拉回定位點。
            isFollowingUser = false;
            updateMyLocationButton();
        });

        map.on("locationerror", (e) => {
            console.warn(e.message);
            isFollowingUser = false;
            updateMyLocationButton();
            // alert("無法取得定位，請確認瀏覽器定位權限已開啟。");
        });
    </script>
</body>

</html>
